<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Cloud (Supabase)</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: #101828;
      }
      body {
        margin: 0;
        background: #f2f4f7;
      }
      .container {
        max-width: 960px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
        padding: 18px;
      }
      h1 { margin: 0 0 12px; font-size: 1.3rem; }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
      input, button {
        border: 1px solid #d0d5dd;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.92rem;
      }
      button { border-color: #6941c6; background: #6941c6; color: white; cursor: pointer; }
      button.secondary { background: white; color: #344054; border-color: #d0d5dd; }
      button.danger { background: #b42318; border-color: #b42318; }
      .status { color: #475467; font-size: 0.9rem; }
      .hidden { display: none; }
      #loginCard { max-width: 420px; margin: 80px auto; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eaecf0; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="loginCard" class="card">
        <h1>Enter password</h1>
        <div class="row">
          <input id="passwordInput" type="password" placeholder="Password" style="flex: 1" />
          <button id="loginBtn">Unlock</button>
        </div>
        <p id="loginStatus" class="status"></p>
      </div>

      <div id="cloudCard" class="card hidden">
        <div class="row" style="justify-content: space-between; margin-top: 0">
          <h1>Personal Cloud</h1>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>

        <p class="status">Upload files to Supabase storage and download anytime.</p>

        <div class="row">
          <input id="fileInput" type="file" style="flex: 1" />
          <button id="uploadBtn">Upload</button>
          <button id="refreshBtn" class="secondary">Refresh</button>
        </div>

        <p id="cloudStatus" class="status"></p>

        <table>
          <thead>
            <tr>
              <th>File</th>
              <th>Size</th>
              <th>Updated</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="fileTableBody"></tbody>
        </table>
      </div>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
