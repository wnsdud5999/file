<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" href="data:," />
    <title>Private Send</title>
    <style>
      :root {
        font-family: Inter, system-ui, Arial, sans-serif;
        color: #ececf1;
      }
      body { margin: 0; background: #212121; }
      .container { max-width: 980px; margin: 20px auto; padding: 0 16px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .card {
        background: #2f2f2f;
        border: 1px solid #3f3f46;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, .25);
        padding: 18px;
      }
      h1 { margin: 0 0 8px; font-size: 1.15rem; color: #fff; }
      p { margin: 0; color: #c5c5d2; font-size: .92rem; line-height: 1.45; }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
      input, button { border: 1px solid #4a4a55; border-radius: 10px; padding: 10px 12px; font-size: .92rem; }
      input { flex: 1; min-width: 120px; background: #1f1f1f; color: #f5f5f5; }
      button { border-color: #6b6b74; background: #3a3a42; color: #fff; cursor: pointer; }
      button:hover { background: #4a4a53; }
      .status { margin-top: 10px; color: #b8b8c5; font-size: .9rem; min-height: 20px; }
      .big-code {
        margin-top: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 1px;
        white-space: pre-line;
        line-height: 1.5;
        color: #f4f4f8;
      }
      .muted { color: #9a9aaa; }
      .hidden { display: none; }
      .drop-zone {
        flex: 1;
        min-width: 220px;
        border: 1px dashed #62626d;
        border-radius: 12px;
        padding: 12px;
        text-align: center;
      }
      .file-picker {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 8px;
      }
      .file-btn {
        display: inline-block;
        border: 1px solid #6b6b74;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
        background: #393944;
        color: #fff;
      }
      .file-name {
        font-size: .86rem;
        color: #c5c5d2;
        max-width: 200px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .admin-log-list {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }
      .admin-log-item {
        border: 1px solid #444453;
        border-radius: 10px;
        background: #272730;
        padding: 10px;
      }
      .admin-log-head {
        font-size: 0.9rem;
        color: #ececf1;
      }
      .admin-log-meta {
        margin-top: 6px;
        font-size: 0.8rem;
        color: #aaaac0;
      }
      .admin-log-actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }
      .upload-queue {
        margin-top: 10px;
        display: grid;
        gap: 6px;
      }
      .upload-queue-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        background: #272730;
        border: 1px solid #444453;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: .86rem;
        color: #cfd0db;
      }
      .upload-queue-left {
        display: grid;
        gap: 4px;
      }
      .upload-queue-status {
        font-size: .78rem;
        color: #a8a9b8;
      }
      .upload-queue-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .queue-remove-btn {
        border: 1px solid #6f6f79;
        background: #383842;
        color: #fff;
        border-radius: 6px;
        width: 28px;
        height: 28px;
        line-height: 1;
        padding: 0;
        font-weight: 700;
      }
      .queue-retry-btn, .queue-clear-btn {
        border: 1px solid #6f6f79;
        background: #383842;
        color: #fff;
        border-radius: 6px;
        padding: 6px 9px;
        font-size: .78rem;
      }
      @media (max-width: 860px){ .grid{ grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="grid">
        <section class="card">
          <h1>Side A</h1>
          <p>Enter value.</p>
          <div class="row">
            <input id="downloadCodeInput" maxlength="6" inputmode="numeric" />
            <button id="downloadBtn">Go</button>
          </div>
          <div id="downloadStatus" class="status"></div>
        </section>

        <section class="card">
          <h1>Side B</h1>
          <p>Restricted area.</p>
          <div class="row">
            <input id="uploadLoginPasswordInput" type="password" />
            <button id="uploadLoginBtn">Enter</button>
            <button id="uploadLogoutBtn" style="display:none">Exit</button>
          </div>
          <div id="uploadAuthStatus" class="status"></div>
          <div id="uploadActions" class="row hidden">
            <div id="dropZone" class="drop-zone">
              <p class="muted">Drop file here</p>
              <div class="file-picker">
                <label for="fileInput" class="file-btn">Choose file</label>
                <span id="selectedFileName" class="file-name">No files selected</span>
              </div>
              <input id="fileInput" type="file" class="sr-only" multiple />
            </div>
            <button id="uploadBtn">Continue</button>
          </div>
          <div class="row">
            <button id="clearQueueBtn" class="queue-clear-btn" style="display:none">Clear all</button>
          </div>
          <div id="uploadQueue" class="upload-queue"></div>
          <div id="adminPanel" class="hidden">
            <div class="row">
              <button id="adminRefreshBtn">Refresh</button>
            </div>
            <div id="adminLogStatus" class="status"></div>
            <div id="adminLogList" class="admin-log-list"></div>
          </div>
          <p id="uploadHint" class="status muted">Locked.</p>
          <div id="uploadStatus" class="status"></div>
          <div id="generatedCode" class="big-code"></div>
        </section>
      </div>
    </div>

    <script type="module" src="./app.js?v=20260417b"></script>
  </body>
</html>
